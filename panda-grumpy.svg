<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="70" height="56">
  <defs>
    <style>
      .fur   { fill: #F5F7FA; }
      .patch { fill: #232733; }
      .blush { fill: #FFB4C6; opacity: 0.5; }
    </style>
  </defs>

  <!-- back paws -->
  <ellipse class="patch" cx="36" cy="63" rx="9" ry="7"/>
  <ellipse class="patch" cx="64" cy="63" rx="9" ry="7"/>

  <!-- body -->
  <ellipse class="fur" cx="50" cy="52" rx="24" ry="20"/>

  <!-- arms crossed-ish -->
  <ellipse class="patch" cx="27" cy="50" rx="6" ry="9" transform="rotate(25 27 50)"/>
  <ellipse class="patch" cx="73" cy="50" rx="6" ry="9" transform="rotate(-25 73 50)"/>

  <!-- head -->
  <circle class="fur" cx="50" cy="26" r="22"/>

  <!-- ears -->
  <circle class="patch" cx="30" cy="10" r="8"/>
  <circle class="patch" cx="70" cy="10" r="8"/>

  <!-- eyebrows (grumpy furrow) -->
  <path d="M30 19 L41 22" stroke="#232733" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M70 19 L59 22" stroke="#232733" stroke-width="2.4" stroke-linecap="round"/>

  <!-- eye patches -->
  <ellipse class="patch" cx="37" cy="28" rx="8" ry="9" transform="rotate(-6 37 28)"/>
  <ellipse class="patch" cx="63" cy="28" rx="8" ry="9" transform="rotate(6 63 28)"/>

  <!-- half-lidded grumpy eyes -->
  <path d="M33 27 Q37 24 41 27 L41 30 Q37 32 33 30 Z" fill="#232733"/>
  <path d="M59 27 Q63 24 67 27 L67 30 Q63 32 59 30 Z" fill="#232733"/>
  <circle fill="#fff" cx="38.5" cy="27.5" r="1.1"/>
  <circle fill="#fff" cx="64.5" cy="27.5" r="1.1"/>
  <path d="M33 27 Q37 24 41 27" stroke="#0B0F14" stroke-width="0.6" fill="none"/>

  <!-- blush -->
  <ellipse class="blush" cx="30" cy="37" rx="4.2" ry="2.8"/>
  <ellipse class="blush" cx="70" cy="37" rx="4.2" ry="2.8"/>

  <!-- nose -->
  <ellipse class="patch" cx="50" cy="34" rx="3.2" ry="2.4"/>

  <!-- grumpy downturned mouth -->
  <path d="M44 40 Q50 36 56 40" stroke="#232733" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
