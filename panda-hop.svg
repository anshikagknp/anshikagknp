<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="60" height="48">
  <defs>
    <style>
      .fur   { fill: #F5F7FA; }
      .patch { fill: #232733; }
      .blush { fill: #FFB4C6; opacity: 0.55; }
    </style>
  </defs>

  <ellipse cx="50" cy="72" rx="16" ry="2.4" fill="#10B981" opacity="0.15">
    <animate attributeName="rx" values="16;9;16;7;16;12;16" keyTimes="0;0.15;0.3;0.5;0.65;0.85;1" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.04;0.15;0.03;0.15;0.06;0.15" keyTimes="0;0.15;0.3;0.5;0.65;0.85;1" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -5; 0 0; 0 -16; 0 0; 0 -9; 0 0"
      keyTimes="0;0.15;0.3;0.5;0.65;0.85;1"
      dur="3.2s" repeatCount="indefinite"/>

    <!-- back paws -->
    <ellipse class="patch" cx="36" cy="63" rx="9" ry="7"/>
    <ellipse class="patch" cx="64" cy="63" rx="9" ry="7"/>

    <!-- body -->
    <ellipse class="fur" cx="50" cy="52" rx="24" ry="20"/>

    <!-- arms -->
    <ellipse class="patch" cx="27" cy="48" rx="6" ry="9" transform="rotate(20 27 48)"/>
    <ellipse class="patch" cx="73" cy="48" rx="6" ry="9" transform="rotate(-20 73 48)"/>

    <!-- head -->
    <circle class="fur" cx="50" cy="26" r="22"/>

    <!-- ears -->
    <circle class="patch" cx="30" cy="10" r="8"/>
    <circle class="patch" cx="70" cy="10" r="8"/>

    <!-- eye patches -->
    <ellipse class="patch" cx="37" cy="27" rx="8" ry="9.5" transform="rotate(-8 37 27)"/>
    <ellipse class="patch" cx="63" cy="27" rx="8" ry="9.5" transform="rotate(8 63 27)"/>

    <!-- eyes (big + sparkly) -->
    <circle fill="#232733" cx="37" cy="28" r="4"/>
    <circle fill="#232733" cx="63" cy="28" r="4"/>
    <circle fill="#fff" cx="38.4" cy="26.4" r="1.3"/>
    <circle fill="#fff" cx="64.4" cy="26.4" r="1.3"/>

    <!-- blush -->
    <ellipse class="blush" cx="30" cy="36" rx="4.5" ry="3"/>
    <ellipse class="blush" cx="70" cy="36" rx="4.5" ry="3"/>

    <!-- nose + mouth -->
    <ellipse class="patch" cx="50" cy="33" rx="3.4" ry="2.6"/>
    <path d="M50 35.5 Q50 39 46 39.5 M50 35.5 Q50 39 54 39.5" stroke="#232733" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
