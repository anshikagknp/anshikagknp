<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#151b23"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e8ecf7"/>
      <stop offset="100%" stop-color="#9fb4ff"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#3b6fff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3b6fff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>

    <style>
      .name {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-size: 48px;
        letter-spacing: 10px;
        fill: url(#nameGrad);
      }
    </style>
  </defs>

  <rect width="900" height="180" fill="url(#bg)"/>
  <rect width="900" height="180" fill="url(#dots)"/>
  <rect width="900" height="180" fill="url(#glow)"/>

  <text x="450" y="105" text-anchor="middle" class="name">ANSHIKA GUPTA</text>

  <rect x="0" y="0" width="900" height="180" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
</svg>
