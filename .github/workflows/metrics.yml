name: Metrics
on:
  push:
    branches: [main, master] # Forces the action to run and register on any push
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the action to write the SVG to your repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Isometric Calendar
        uses: lowlighter/metrics@latest
        env:
          # Forces compatibility with the latest 2026 GitHub Node runtimes
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-isocalendar.svg
          base: "" 
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # CRITICAL: Forces the action to automatically push the file to your main branch
          committer_branch: main
          committer_message: "chore: update isometric calendar [skip ci]"

